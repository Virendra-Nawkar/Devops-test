version: "3.9"

# ── DevOps Test Suite — Production Docker Compose ─────────────────────────────
#
#  Services:
#    backend   — Node.js 20 Express API on port 8081 with all scanner CLIs installed
#    frontend  — Vite-built React app served by nginx on port 80
#
#  Volumes:
#    scan_history — persists scan-history.json between container restarts
#    uploads      — persists uploaded files (useful for debugging)
#
#  Usage:
#    1. Copy backend/.env.example → backend/.env  and set VM_IP
#    2. docker compose up --build -d
#    3. Open http://<VM_IP> in your browser
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-virendranawkar/devops-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devops-backend
    restart: unless-stopped

    env_file:
      - ./backend/.env          # reads PORT, VM_IP, CORS_ORIGIN, etc.

    environment:
      - NODE_ENV=production
      - PORT=8081
      - HOST=0.0.0.0

    ports:
      - "8081:8081"             # expose backend directly (useful for debugging / direct API calls)

    volumes:
      - uploads:/app/uploads
      - scan_history:/app/scan-history-data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - devops-net


  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-virendranawkar/devops-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devops-frontend
    restart: unless-stopped

    ports:
      - "80:80"                 # public-facing port — open this in your browser

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - devops-net


# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  uploads:
    driver: local
  scan_history:
    driver: local


# ── Internal network ───────────────────────────────────────────────────────────
networks:
  devops-net:
    driver: bridge
